server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    discovery:
      enabled: false
    gateway:
      httpclient:
        connect-timeout: 30000
        response-timeout: 100s
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      default-filters:
        - name: Retry
          args:
            retries: 4
            statuses: BAD_GATEWAY, SERVICE_UNAVAILABLE, GATEWAY_TIMEOUT
            methods: GET, POST, PUT, DELETE, OPTIONS
            backoff:
              firstBackoff: 2000ms
              maxBackoff: 20000ms
              factor: 2
              basedOnPreviousValue: true
      routes:
        # Auth Admin Service (8081)
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**
        - id: admin-user-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/admin/users/**, /api/v1/admin/statistics
        
        # Booking API Service (8082)
        - id: booking-service
          uri: ${BOOKING_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/bookings/**
        - id: event-service
          uri: ${BOOKING_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/events/**
        - id: admin-event-service
          uri: ${BOOKING_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/admin/events/**, /api/v1/admin/dashboard/**
        - id: transport-service
          uri: ${BOOKING_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/transport/**
        - id: organizer-service
          uri: ${BOOKING_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/organizer/**
        - id: support-service
          uri: ${BOOKING_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/support/**


management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

server:
  port: ${PORT:8081}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: auth-admin-service

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb+srv://gurujaskaran2006_db_user:123@cluster0.imdqenc.mongodb.net/waygonway_db?retryWrites=true&w=majority}
      auto-index-creation: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    default-property-inclusion: NON_NULL
    date-format: yyyy-MM-dd HH:mm:ss

  security:
    user:
      name: ${ADMIN_USERNAME:admin}
      password: ${ADMIN_PASSWORD:admin123}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:WaygonWaySecretKeyForTokenGeneration2024!@#$%}
  expiration: ${JWT_EXPIRATION:86400000}  # 24 hours in milliseconds
  issuer: WaygonWay-AuthService
  header: Authorization
  prefix: Bearer

# Logging Configuration
logging:
  level:
    com.waygonway: INFO
    org.springframework: WARN
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.springframework.data.mongodb: WARN
    root: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/auth-admin-service.log

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

# Application Info
info:
  app:
    name: WaygonWay Auth Admin Service
    description: Authentication and User Management Service
    version: 1.0.0
    developer: WaygonWay Team
  build:
    artifact: auth-admin-service
    group: com.waygonway

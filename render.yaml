services:
  # API Gateway
  - type: web
    name: api-gateway
    env: docker
    dockerContext: .
    dockerfilePath: api-gateway/Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 10000
      - key: AUTH_SERVICE_URL
        value: http://auth-admin-service:10000
      - key: BOOKING_SERVICE_URL
        value: http://booking-api-service:10000
      - key: DATABASE_SERVICE_URL
        value: http://database-service:10000

  # Auth Admin Service
  - type: web
    name: auth-admin-service
    env: docker
    dockerContext: .
    dockerfilePath: auth-admin-service/Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  # Booking API Service
  - type: web
    name: booking-api-service
    env: docker
    dockerContext: .
    dockerfilePath: booking-api-service/Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false

  # Database Service
  - type: web
    name: database-service
    env: docker
    dockerContext: .
    dockerfilePath: database-service/Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false

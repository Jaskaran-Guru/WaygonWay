server:
  port: ${PORT:8083}

spring:
  application:
    name: database-service

  profiles:
    include: common

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb+srv://gurujaskaran2006_db_user:123@cluster0.imdqenc.mongodb.net/waygonway_db?retryWrites=true&w=majority}
      database: ${MONGODB_DATABASE:train_reservation_db}

logging:
  level:
    com.waygonway.database: DEBUG


management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
